# Ludus — alternative interface stack: backend + MCP + frontend.
# Usage: docker compose up --build   then open http://localhost:8080
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      LUDUS_DATABASE_URL: sqlite:////data/ludus.db
      LUDUS_BASELINES_DIR: /data/baselines
      LUDUS_SCENARIOS_DIR: /app/scenarios
      LUDUS_CORS_ORIGINS: "*"
      # Optional: enable live adapters by passing an API key.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ludus-data:/data

  mcp:
    build:
      context: .
      dockerfile: docker/mcp.Dockerfile
    environment:
      LUDUS_API_URL: http://backend:8000
      LUDUS_MCP_HOST: 0.0.0.0
      LUDUS_MCP_PORT: 8765
    ports:
      - "${MCP_PORT:-8765}:8765"
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  ludus-data:
