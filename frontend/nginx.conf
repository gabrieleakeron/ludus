# nginx config for serving the built SPA and proxying /api to the backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (name "backend" on the compose network).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # SPA fallback: any unknown path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
