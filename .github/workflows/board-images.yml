name: Board images

# Pushing a tag like `board-v1.2.0` builds the three Ludus Board Docker images
# (server/backend, board/frontend, mcp) and pushes them to Docker Hub under the
# `gabrieleconsonni` account, tagged with both `:latest` and the semantic
# version from the tag.
#
# All three images share a single build context â€” `packages/ludus-board` â€” and
# are distinguished only by which Dockerfile under its `docker/` dir is
# selected via `file:`. The backend/mcp Dockerfiles COPY `pyproject.toml`,
# `README.md`, `LICENSE`, `src`, `scenarios`, `fixtures`, `rubrics`; the
# frontend Dockerfile COPYs `frontend/` â€” all from the ludus-board root, so a
# per-service context would break those COPY paths (this mirrors how the dev
# `docker-compose.yml` in that package already builds: `context: .` +
# `dockerfile: docker/<x>.Dockerfile`).
#
# Kept separate from `release.yml` (which builds the `ludus` CLI tarball on
# `v*` tags): the board images and the CLI are released on independent cycles.
#
# Required GitHub secrets:
#   DOCKERHUB_USERNAME â€” the Docker Hub account (e.g. gabrieleconsonni)
#   DOCKERHUB_TOKEN    â€” a Docker Hub access token with Read & Write scope

on:
  push:
    tags:
      - 'board-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ludus-server
            file: packages/ludus-board/docker/backend.Dockerfile
          - image: ludus-board
            file: packages/ludus-board/docker/frontend.Dockerfile
          - image: ludus-mcp
            file: packages/ludus-board/docker/mcp.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version from tag (strip "board-v")
        id: ver
        run: echo "version=${GITHUB_REF_NAME#board-v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: packages/ludus-board
          file: ${{ matrix.file }}
          push: true
          tags: |
            gabrieleconsonni/${{ matrix.image }}:latest
            gabrieleconsonni/${{ matrix.image }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
