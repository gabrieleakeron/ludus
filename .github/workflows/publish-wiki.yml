name: Publish wiki

# Sync the Markdown pages under wiki/ to the GitHub project wiki.
# Runs in GitHub infrastructure, where the <repo>.wiki.git repository is reachable
# with GITHUB_TOKEN (it is not reachable from the dev/agent environment).
#
# Prerequisites:
#   * the wiki feature must be ENABLED in the repository settings;
#   * the wiki must be INITIALIZED once (create any first page via the GitHub UI),
#     otherwise <repo>.wiki.git does not yet exist and the first push fails.

on:
  push:
    branches:
      - main
      - claude/architecture-roadmap-docs-aqr4oj
    paths:
      - "wiki/**"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync wiki/ to the GitHub wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # ${SERVER} is like https://github.com ; inject the token for push auth.
          WIKI_URL="${SERVER#https://}"
          WIKI_URL="https://x-access-token:${GH_TOKEN}@${WIKI_URL}/${REPO}.wiki.git"

          tmp="$(mktemp -d)"
          if ! git clone "${WIKI_URL}" "${tmp}/wiki" 2>/dev/null; then
            echo "::error::Could not clone the wiki repo. Enable the wiki in repo settings and initialize it with one page via the UI, then re-run."
            exit 1
          fi

          # Replace all generated pages; preserve the wiki's .git directory.
          find "${tmp}/wiki" -maxdepth 1 -type f -name '*.md' -delete
          cp wiki/*.md "${tmp}/wiki/"

          cd "${tmp}/wiki"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No wiki changes to publish."
            exit 0
          fi
          git add -A
          git commit -m "docs(wiki): sync from wiki/ @ ${GITHUB_SHA:-unknown}"
          git push origin HEAD
